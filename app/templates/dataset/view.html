{% extends "base.html" %}
{% block title %}View Dataset{% endblock %}
{% block page_title %}Dataset: {{ dataset.name }}{% endblock %}

{% block content %}
<div class="card content-card mb-4">
    <div class="card-header d-flex justify-content-between align-items-center">
        <span><i class="fas fa-table me-2"></i>Dataset Preview (First 20 rows)</span>
        <span class="badge bg-primary">{{ total_rows }} total rows</span>
    </div>
    <div class="card-body p-0">
        <div class="table-responsive">
            {{ preview | safe }}
        </div>
    </div>
</div>
<a href="{{ url_for('dataset.index') }}" class="btn btn-outline-secondary">
    <i class="fas fa-arrow-left me-2"></i>Back to Datasets
</a>
{% endblock %}
